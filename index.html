<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Secure Verification Camera</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f6f9; margin: 0; }
        .container { text-align: center; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 25px rgba(0,0,0,0.08); width: 90%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; font-size: 22px; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; transform: scaleX(-1); display: none; }
        button { background-color: #28a745; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; display: none; }
        button:hover { background-color: #218838; }
        #status { margin-top: 15px; font-weight: 600; color: #555; font-size: 14px; }
        .user-badge { font-size: 14px; color: #0056b3; background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; display: none; }
        .login-box { margin: 20px 0; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Secure Verification System</h2>
    
    <div id="loginSection">
        <p style="color: #666; font-size: 14px;">Kripya verification shuru karne ke liye login karein:</p>
        <div class="login-box">
            <div id="g_id_onload"
                 data-client_id="https://script.google.com/macros/s/AKfycbwEDy-Jwpfut_tj0UBBXKqQMpB0QoTYp6nPYPJiEmJcmZI3UWF38x6A6rR-qCd_ZSS8cQ/exec"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>
    </div>

    <div class="user-badge" id="emailDisplay"></div>
    <video id="video" autoplay playsinline></video>
    <button id="captureBtn">Verify & Submit Photo</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="status">Awaiting Login Authorization...</div>
</div>

<script>
    // 🚨 APNA GOOGLE APP SCRIPT URL YAHAN PASTE KAREIN
    const webAppUrl = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const emailDisplay = document.getElementById('emailDisplay');
    const loginSection = document.getElementById('loginSection');
    
    let verifiedUserEmail = "";

    // JWT Token ko decode karne ka function (Email nikalne ke liye)
    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    // Google Login hone ke baad yeh function chalega
    function handleCredentialResponse(response) {
        const responsePayload = parseJwt(response.credential);
        verifiedUserEmail = responsePayload.email; // Target Email secured tarike se mil gayi!
        
        // UI badalna
        loginSection.style.display = "none";
        emailDisplay.innerText = "✓ Verified Google Account: " + verifiedUserEmail;
        emailDisplay.style.display = "block";
        video.style.display = "block";
        captureBtn.style.display = "block";
        
        // Ab camera chalu karna (GitHub par bina error ke chalega)
        startCamera();
    }

    function startCamera() {
        statusDiv.innerText = "Initializing secure camera...";
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
            .then(stream => { 
                video.srcObject = stream; 
                statusDiv.innerText = "Camera Active & Secure"; 
                statusDiv.style.color = "#28a745";
            })
            .catch(err => { 
                statusDiv.innerText = "❌ Camera Permission Denied!"; 
                statusDiv.style.color = "#dc3545";
            });
    }

    // Capture and Send
    captureBtn.addEventListener('click', () => {
        statusDiv.innerText = "🔄 Processing capture...";
        
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        context.translate(canvas.width, 0);
        context.scale(-1, 1);
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg');
        statusDiv.innerText = "📤 Syncing with Google Sheets...";

        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: imageData, email: verifiedUserEmail })
        })
        .then(() => {
            statusDiv.innerText = "✅ Data Securely Saved!";
            statusDiv.style.color = "#28a745";
            alert("Mubarak ho! Verified Email aur Photo Sheet mein save ho gayi.");
        })
        .catch(err => {
            statusDiv.innerText = "❌ Network Error!";
        });
    });
</script>

</body>
</html>
