<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Camera Web App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #eef2f3; margin: 0; padding: 20px; }
        .box { max-width: 450px; margin: 30px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        video { width: 100%; max-width: 380px; border-radius: 8px; background: #000; transform: scaleX(-1); }
        button { background: #2ecc71; color: white; border: none; padding: 14px 20px; font-size: 16px; border-radius: 30px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 100%; max-width: 280px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); transition: 0.2s; }
        button:hover { background: #27ae60; transform: translateY(-1px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; box-shadow: none; }
        #status { margin-top: 15px; font-weight: bold; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>📸 Secure Attendance Camera</h2>
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="snap">Photo Khicho & Save Karo</button>
    <div id="status">Camera loading...</div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    const snapBtn = document.getElementById('snap');

    // 🚨 YAHAN APNA GOOGLE WEB APP URL DAALEIN
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxwoJSS38pw8zb9kHOQOtrY-7FcLdwcf4gWQqWJpKXl4nzjQrhWwdkiecI4NG0GD2UHcA/execc"; 

    // Camera mangne ka modern tareeka
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => { 
        video.srcObject = stream; 
        statusDiv.innerText = "Camera Active Hai 👍";
    })
    .catch(err => { 
        statusDiv.innerText = "Error: Camera permission nahi mili.";
        console.error(err);
    });

    // Capture Button Click
    snapBtn.addEventListener('click', () => {
        if(webAppUrl.includes("AAPKA_GOOGLE")) {
            alert("Pehle index.html mein apna Google Apps Script URL dalein!");
            return;
        }

        statusDiv.innerText = "Processing... Please wait...";
        snapBtn.disabled = true;

        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.8); // 80% quality compress takki fast upload ho

        // Data posting to Google Sheets
        fetch(webAppUrl, {
            method: "POST",
            body: JSON.stringify({ image: imageData }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === "success") {
                statusDiv.innerText = "✅ Photo Sheet & Drive mein save ho gayi!";
            } else {
                statusDiv.innerText = "❌ Error: " + data.message;
            }
            snapBtn.disabled = false;
        })
        .catch(err => { 
            statusDiv.innerText = "❌ Network Error! Connection check karein.";
            snapBtn.disabled = false;
            console.error(err);
        });
    });
</script>
</body>
</html>
